apiVersion: v1
kind: ConfigMap
metadata:
  name: movie-site
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>CineVerse - IMDb Top Movies</title>
      <style>
        body{margin:0;background:#111827;color:white;font-family:Arial,sans-serif}
        header{text-align:center;padding:20px;background:#000}
        h1{color:#f5c518}
        #search{width:80%;max-width:500px;padding:10px;border-radius:6px;border:none}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px;padding:20px}
        .card{background:#1f2937;border-radius:10px;overflow:hidden}
        .card img{width:100%;height:320px;object-fit:cover}
        .info{padding:12px}
        .rating{color:#f5c518}
      </style>
    </head>
    <body>
      <header>
        <h1>🎬 CineVerse</h1>
        <p>IMDb Favorites + Bollywood Classics</p>
        <input id="search" placeholder="Search movies...">
      </header>
      <div class="grid" id="movies"></div>
      <script>
      const movies=[
      ["The Shawshank Redemption","9.3"],["The Godfather","9.2"],["The Dark Knight","9.0"],["The Godfather Part II","9.0"],
      ["12 Angry Men","9.0"],["Schindler's List","9.0"],["LOTR: Return of the King","9.0"],["Pulp Fiction","8.9"],
      ["The Good, the Bad and the Ugly","8.8"],["Fight Club","8.8"],["Forrest Gump","8.8"],["Inception","8.8"],
      ["The Matrix","8.7"],["Goodfellas","8.7"],["Interstellar","8.7"],["City of God","8.6"],
      ["Spirited Away","8.6"],["Saving Private Ryan","8.6"],["Parasite","8.5"],["The Green Mile","8.6"],
      ["Se7en","8.6"],["Whiplash","8.5"],["The Prestige","8.5"],["Gladiator","8.5"],
      ["The Departed","8.5"],["The Lion King","8.5"],["Back to the Future","8.5"],["Alien","8.5"],
      ["The Pianist","8.5"],["Terminator 2","8.5"],["Joker","8.4"],["Django Unchained","8.5"],
      ["Oppenheimer","8.4"],["Dune","8.3"],["Avengers: Endgame","8.4"],["Blade Runner 2049","8.0"],
      ["Mad Max: Fury Road","8.1"],["The Social Network","7.8"],["Memento","8.4"],["Oldboy","8.4"],
      ["3 Idiots","8.4"],["Taare Zameen Par","8.3"],["Dangal","8.3"],["Drishyam","8.2"],
      ["Black Friday","8.4"],["Gangs of Wasseypur","8.2"],["Lagaan","8.1"],["Swades","8.2"],
      ["Andhadhun","8.2"],["Chak De! India","8.1"]
      ];
      const grid=document.getElementById('movies');
      function render(list){
        grid.innerHTML='';
        list.forEach((m,i)=>{
          grid.innerHTML+=`<div class="card">
            <img src="https://picsum.photos/400/600?random=${i+1}">
            <div class="info"><h3>${m[0]}</h3><div class="rating">⭐ ${m[1]}</div></div>
          </div>`;
        });
      }
      render(movies);
      document.getElementById('search').addEventListener('input',e=>{
        const q=e.target.value.toLowerCase();
        render(movies.filter(m=>m[0].toLowerCase().includes(q)));
      });
      </script>
    </body>
    </html>
